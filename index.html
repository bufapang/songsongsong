<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sing with me! 君乐参赛作品</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ec4899',
                        secondary: '#f43f5e',
                    },
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-100 to-purple-100">
    <nav class="bg-gradient-to-r from-pink-500 to-red-500 text-white shadow-lg">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center">
                <i class="fa fa-microphone text-2xl mr-3"></i>
                <span class="text-xl font-bold">sing with me!</span>
                <span class="ml-2 text-sm bg-white/20 px-2 py-1 rounded-full">君乐参赛作品</span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-3">🎤 用你的声音唱任何歌曲！</h1>
                <p class="text-gray-600">录制一段你的声音，选择歌曲，AI会用你的声音唱出完整的歌</p>
            </div>

            <!-- 步骤1：录音 -->
            <div id="step1" class="mb-8">
                <h2 class="text-xl font-bold text-gray-800 mb-4">第一步：录制你的声音</h2>
                <div class="flex flex-col items-center">
                    <div class="w-32 h-32 rounded-full bg-pink-100 flex items-center justify-center mb-4">
                        <i class="fa fa-microphone text-4xl text-pink-500" id="mic-icon"></i>
                    </div>
                    <div class="flex space-x-4 mb-4">
                        <button id="start-record" class="px-6 py-2 bg-pink-500 hover:bg-pink-600 text-white rounded-lg shadow">
                            <i class="fa fa-circle mr-2 text-red-300"></i> 开始录制
                        </button>
                        <button id="stop-record" class="px-6 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg shadow hidden">
                            <i class="fa fa-stop mr-2"></i> 停止录制
                        </button>
                    </div>
                    <p class="text-sm text-gray-500">建议录制10-30秒清晰的声音，效果更好</p>
                </div>
            </div>

            <!-- 步骤2：选歌 -->
            <div id="step2" class="mb-8 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">第二步：选择歌曲</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="song-card border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-pink-500" data-song="sunny">
                        <div class="aspect-square bg-gradient-to-br from-yellow-400 to-orange-500 rounded-lg flex items-center justify-center mb-3">
                            <i class="fa fa-sun-o text-white text-3xl"></i>
                        </div>
                        <h3 class="font-bold">晴天</h3>
                        <p class="text-sm text-gray-500">周杰伦</p>
                    </div>
                    <div class="song-card border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-pink-500" data-song="rice">
                        <div class="aspect-square bg-gradient-to-br from-green-400 to-teal-500 rounded-lg flex items-center justify-center mb-3">
                            <i class="fa fa-leaf text-white text-3xl"></i>
                        </div>
                        <h3 class="font-bold">稻香</h3>
                        <p class="text-sm text-gray-500">周杰伦</p>
                    </div>
                    <div class="song-card border-2 border-gray-200 rounded-xl p-4 cursor-pointer hover:border-pink-500" data-song="resonance">
                        <div class="aspect-square bg-gradient-to-br from-blue-400 to-indigo-500 rounded-lg flex items-center justify-center mb-3">
                            <i class="fa fa-users text-white text-3xl"></i>
                        </div>
                        <h3 class="font-bold">人间共鸣</h3>
                        <p class="text-sm text-gray-500">李健</p>
                    </div>
                </div>
            </div>

            <!-- 步骤3：生成 -->
            <div id="step3" class="mb-8 hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">第三步：生成歌曲</h2>
                <div class="flex flex-col items-center">
                    <div class="w-32 h-32 rounded-full bg-purple-100 flex items-center justify-center mb-4">
                        <i class="fa fa-cog fa-spin text-4xl text-purple-500"></i>
                    </div>
                    <div class="w-full max-w-md mb-4">
                        <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                            <div class="h-full bg-pink-500 transition-all duration-300" id="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                    <p class="text-gray-600" id="status-text">正在生成你的专属歌曲...</p>
                </div>
            </div>

            <!-- 结果 -->
            <div id="result" class="hidden">
                <h2 class="text-xl font-bold text-gray-800 mb-4">🎉 生成完成！</h2>
                <div class="bg-gradient-to-r from-pink-50 to-purple-50 rounded-xl p-6">
                    <h3 class="font-bold text-lg mb-3" id="result-song-name"></h3>
                    <audio controls class="w-full mb-4" id="result-audio">
                        你的浏览器不支持音频播放
                    </audio>
                    <div class="flex justify-center space-x-4">
                        <a id="download-btn" href="#" class="px-6 py-2 bg-pink-500 hover:bg-pink-600 text-white rounded-lg shadow flex items-center">
                            <i class="fa fa-download mr-2"></i> 下载歌曲
                        </a>
                        <button onclick="location.reload()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg shadow">
                            <i class="fa fa-refresh mr-2"></i> 重新生成
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let recordedBlob;
        let selectedSong = null;

        const startRecordBtn = document.getElementById('start-record');
        const stopRecordBtn = document.getElementById('stop-record');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const result = document.getElementById('result');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const resultAudio = document.getElementById('result-audio');
        const resultSongName = document.getElementById('result-song-name');
        const downloadBtn = document.getElementById('download-btn');
        const songCards = document.querySelectorAll('.song-card');

        // 录音功能
        startRecordBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                startRecordBtn.classList.add('hidden');
                stopRecordBtn.classList.remove('hidden');
            } catch (e) {
                alert('请允许麦克风访问权限');
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                stopRecordBtn.classList.add('hidden');
                startRecordBtn.classList.remove('hidden');
            }
        });

        // 选歌
        songCards.forEach(card => {
            card.addEventListener('click', () => {
                songCards.forEach(c => c.classList.remove('border-pink-500', 'bg-pink-50'));
                card.classList.add('border-pink-500', 'bg-pink-50');
                selectedSong = card.dataset.song;
                
                step2.classList.add('hidden');
                step3.classList.remove('hidden');
                generateSong();
            });
        });

        // 生成歌曲
        async function generateSong() {
            try {
                progressBar.style.width = '30%';
                statusText.textContent = '正在上传声音...';

                const formData = new FormData();
                formData.append('voice', recordedBlob, 'voice.wav');
                formData.append('song', selectedSong);

                progressBar.style.width = '60%';
                statusText.textContent = 'AI正在学习你的声音...';

                // 模拟生成过程
                await new Promise(resolve => setTimeout(resolve, 3000));

                progressBar.style.width = '100%';
                statusText.textContent = '生成完成！';

                // 显示结果
                await new Promise(resolve => setTimeout(resolve, 500));
                step3.classList.add('hidden');
                result.classList.remove('hidden');

                const songNames = {
                    'sunny': '晴天',
                    'rice': '稻香',
                    'resonance': '人间共鸣'
                };

                resultSongName.textContent = songNames[selectedSong];
                resultAudio.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
                downloadBtn.href = resultAudio.src;
                downloadBtn.download = `${songNames[selectedSong]} - 你的版本.mp3`;

            } catch (e) {
                alert('生成失败，请重试：' + e.message);
                location.reload();
            }
        }
    </script>
</body>
</html>
